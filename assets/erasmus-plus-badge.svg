<svg xmlns="http://www.w3.org/2000/svg" width="320" height="108" viewBox="0 0 320 108" role="img" aria-labelledby="title desc">
  <title id="title">Erasmus+ badge</title>
  <desc id="desc">Blue and yellow Erasmus+ themed badge</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="4" y="8" rx="26" ry="26" width="312" height="92" fill="url(#bg)"/>
    <rect x="4" y="8" rx="26" ry="26" width="312" height="92" fill="none" stroke="#93c5fd" stroke-opacity="0.28"/>
    <g transform="translate(24,23)">
      <rect x="0" y="0" width="70" height="46" rx="10" fill="#0a3ea8" stroke="#ffffff" stroke-opacity="0.35"/>
      <g transform="translate(35,23)" fill="url(#gold)">
        <polygon points="0,-11 2.6,-3.3 10.6,-3.3 4.1,1.4 6.7,9.1 0,4.5 -6.7,9.1 -4.1,1.4 -10.6,-3.3 -2.6,-3.3"/>
        <g transform="rotate(60)">
          <polygon points="0,-11 2.6,-3.3 10.6,-3.3 4.1,1.4 6.7,9.1 0,4.5 -6.7,9.1 -4.1,1.4 -10.6,-3.3 -2.6,-3.3"/>
        </g>
        <g transform="rotate(120)">
          <polygon points="0,-11 2.6,-3.3 10.6,-3.3 4.1,1.4 6.7,9.1 0,4.5 -6.7,9.1 -4.1,1.4 -10.6,-3.3 -2.6,-3.3"/>
        </g>
      </g>
    </g>
    <text x="115" y="48" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="800" fill="#ffffff">Erasmus+</text>
    <text x="115" y="74" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#dbeafe" letter-spacing="1.6">EDUCATION MOBILITY CONTEXT</text>
  </g>
